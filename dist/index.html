<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Widgets</title>
</head>
<body>
  <h1>Widgets</h1>

  <div id="widgets">Loading...</div>

  <h2>Selected widget</h2>
  <pre id="result">No widget selected.</pre>

  <script>
    async function loadWidgets() {
      const response = await fetch("/api/widgets");
      const widgets = await response.json();

      const container = document.getElementById("widgets");
      container.innerHTML = "";

      widgets.forEach((widget) => {
        const button = document.createElement("button");
        button.textContent = `${widget.name} - Submit`;
        button.onclick = () => submitWidget(widget.id);

        const wrapper = document.createElement("div");
        wrapper.style.marginBottom = "10px";
        wrapper.appendChild(button);

        container.appendChild(wrapper);
      });
    }

    async function submitWidget(id) {
      const response = await fetch(`/api/widgets/${id}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        }
      });

      const resultBox = document.getElementById("result");

      if (!response.ok) {
        resultBox.textContent = `Error: ${response.status}`;
        return;
      }

      const widget = await response.json();
      resultBox.textContent = JSON.stringify(widget, null, 2);
    }

    loadWidgets();
  </script>
</body>
</html>
